apiVersion: llm-ci/v1
kind: DeployCase

metadata:
  name: qwen25-05b-static
  title: Qwen2.5 0.5B Static DeployCase Contract Check
  level: static
  owner: vllm-ascend-ci
  description: Static Jenkins case used by PR/static flows to validate DeployCase rendering and CLI generation.
  tags:
    - static
    - single-service
    - qwen

doc:
  output: docs/deploy/generated/qwen25_05b_static.md
  audience: CI maintainers
  difficulty: basic
  generated_warning: "本文档由 .ci/deploy_cases/*.yaml 自动生成，请不要直接手工修改。"

requirements:
  hardware:
    accelerator: Ascend NPU
    min_cards: 1
    memory: "16 GB or higher recommended"
  software:
    python: ">=3.10"
    cann: "Compatible with the checked-out vLLM Ascend branch"
    vllm_ascend: "Installed from this repository"
  model:
    name: Qwen/Qwen2.5-0.5B-Instruct
    source: Hugging Face or ModelScope
    path_hint: "Set MODEL_ROOT to force a local model path during runtime execution."

runtime:
  image: "${REGISTRY}/vllm-ascend-ci:${IMAGE_TAG}"
  workdir: "."
  env:
    VLLM_USE_MODELSCOPE: "true"

services:
  - name: qwen25-static
    role: serve
    type: vllm-serve
    host: 127.0.0.1
    port: 8001
    log_file: logs/deploy/qwen25-05b-static/server.log
    vllm:
      model: Qwen/Qwen2.5-0.5B-Instruct
      local_model_path: ${MODEL_ROOT}/Qwen2.5-0.5B-Instruct
      served_model_name: qwen25-05b-static
      args:
        - --served-model-name
        - qwen25-05b-static
        - --host
        - 127.0.0.1
        - --port
        - "8001"
        - --max-model-len
        - "2048"
        - --max-num-batched-tokens
        - "2048"
        - --trust-remote-code

checks:
  readiness:
    path: /health
    timeout_sec: 600
    interval_sec: 5

tests:
  smoke:
    enabled: true
    endpoint: /v1/completions
    method: POST
    expected_http_status: 200
    payload:
      model: qwen25-05b-static
      prompt: "San Francisco is a"
      max_tokens: 8
      temperature: 0
  benchmark:
    enabled: false
    command: []
    thresholds:
      max_failed_requests: 0
      max_ttft_regression_pct: 10
      max_tpot_regression_pct: 10
      max_itl_regression_pct: 10
      max_throughput_drop_pct: 10
  accuracy:
    enabled: false
    mode: execute_only
    command: []
