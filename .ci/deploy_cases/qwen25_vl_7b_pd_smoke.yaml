apiVersion: llm-ci/v1
kind: DeployCase

metadata:
  name: qwen25-vl-7b-pd-smoke
  title: Qwen2.5-VL 7B P/D Smoke Deployment
  level: smoke
  levels:
    - static
    - smoke
  owner: vllm-ascend-ci
  description: Single-node Qwen2.5-VL-7B-Instruct prefiller/decoder disaggregated deployment for PR contract checks and smoke validation.
  tags:
    - static
    - smoke
    - vl
    - pd
    - pd-disaggregation
    - qwen

doc:
  output: docs/deploy/generated/qwen25_vl_7b_pd_smoke.md
  audience: CI maintainers and vLLM Ascend deployment engineers
  difficulty: intermediate
  generated_warning: "本文档由 .ci/deploy_cases/*.yaml 自动生成，请不要直接手工修改。"

requirements:
  hardware:
    accelerator: Ascend NPU
    soc: any
    min_cards: 2
    card_count: 2
    allow_parallel_on_host: true
    memory: "32 GB or higher per card recommended"
  software:
    python: ">=3.10"
    cann: "Compatible with the checked-out vLLM Ascend branch"
    vllm_ascend: "Installed in the runtime Docker image"
    extra: "MooncakeConnectorV1 support is required for P/D KV transfer."
  model:
    name: Qwen/Qwen2.5-VL-7B-Instruct
    source: Hugging Face or ModelScope
    path_hint: "Set MODEL_ROOT to a local model mirror when Jenkins agents cannot download models."

runtime:
  image: "${REGISTRY}/vllm-ascend-ci:${IMAGE_TAG}"
  workdir: /home/ma-user/AscendCloud/jenkins
  env:
    VLLM_USE_MODELSCOPE: "true"
    PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
    HCCL_IF_IP: localhost
    GLOO_SOCKET_IFNAME: eth0
    TP_SOCKET_IFNAME: eth0
    HCCL_SOCKET_IFNAME: eth0
    OMP_PROC_BIND: "false"
    OMP_NUM_THREADS: "10"
  docker:
    enabled: true
    image: "${ASCEND_DOCKER_IMAGE}"
    workspace: /home/ma-user/AscendCloud/jenkins
    network: host
    ipc: host
    shm_size: 1g
    mounts:
      - source: "${WORKSPACE}/.ci"
        target: /home/ma-user/AscendCloud/jenkins/.ci
        mode: ro
      - source: "${WORKSPACE}/reports"
        target: /home/ma-user/AscendCloud/jenkins/reports
        mode: rw
      - source: "${WORKSPACE}/logs"
        target: /home/ma-user/AscendCloud/jenkins/logs
        mode: rw
      - source: "${MODEL_ROOT}"
        target: "${MODEL_ROOT}"
        mode: ro

services:
  - name: qwen25-vl-proxy
    role: proxy
    type: command
    host: 127.0.0.1
    port: 8090
    served_model_name: qwen25-vl-7b-pd
    resources:
      card_count: 0
    log_file: logs/deploy/qwen25-vl-7b-pd-smoke/proxy.log
    command:
      - python3
      - .ci/scripts/pd_proxy.py
      - --host
      - 127.0.0.1
      - --port
      - ${SERVICE_QWEN25_VL_PROXY_PORT}
      - --prefiller-urls
      - http://${SERVICE_QWEN25_VL_PREFILL_HOST}:${SERVICE_QWEN25_VL_PREFILL_PORT}
      - --decoder-urls
      - http://${SERVICE_QWEN25_VL_DECODE_HOST}:${SERVICE_QWEN25_VL_DECODE_PORT}

  - name: qwen25-vl-prefill
    role: prefill
    type: vllm-serve
    host: 127.0.0.1
    port: 8091
    resources:
      card_count: 1
      extra_port_count: 1
      extra_ports:
        - 30000
    log_file: logs/deploy/qwen25-vl-7b-pd-smoke/prefill.log
    vllm:
      model: Qwen/Qwen2.5-VL-7B-Instruct
      local_model_path: ${MODEL_ROOT}/Qwen2.5-VL-7B-Instruct
      served_model_name: qwen25-vl-7b-pd
      args:
        - --served-model-name
        - qwen25-vl-7b-pd
        - --host
        - 127.0.0.1
        - --port
        - "8091"
        - --no-enable-prefix-caching
        - --tensor-parallel-size
        - "1"
        - --seed
        - "1024"
        - --max-model-len
        - "10000"
        - --max-num-batched-tokens
        - "10000"
        - --trust-remote-code
        - --gpu-memory-utilization
        - "0.90"
        - --kv-transfer-config
        - '{"kv_connector":"MooncakeConnectorV1","kv_role":"kv_producer","kv_port":"${SERVICE_QWEN25_VL_PREFILL_EXTRA_PORT_0}","engine_id":"0","kv_connector_extra_config":{"prefill":{"dp_size":1,"tp_size":1},"decode":{"dp_size":1,"tp_size":1}}}'

  - name: qwen25-vl-decode
    role: decode
    type: vllm-serve
    host: 127.0.0.1
    port: 8092
    resources:
      card_count: 1
      extra_port_count: 1
      extra_ports:
        - 30100
    log_file: logs/deploy/qwen25-vl-7b-pd-smoke/decode.log
    vllm:
      model: Qwen/Qwen2.5-VL-7B-Instruct
      local_model_path: ${MODEL_ROOT}/Qwen2.5-VL-7B-Instruct
      served_model_name: qwen25-vl-7b-pd
      args:
        - --served-model-name
        - qwen25-vl-7b-pd
        - --host
        - 127.0.0.1
        - --port
        - "8092"
        - --no-enable-prefix-caching
        - --tensor-parallel-size
        - "1"
        - --seed
        - "1024"
        - --max-model-len
        - "10000"
        - --max-num-batched-tokens
        - "10000"
        - --trust-remote-code
        - --gpu-memory-utilization
        - "0.90"
        - --kv-transfer-config
        - '{"kv_connector":"MooncakeConnectorV1","kv_role":"kv_consumer","kv_port":"${SERVICE_QWEN25_VL_DECODE_EXTRA_PORT_0}","engine_id":"1","kv_connector_extra_config":{"prefill":{"dp_size":1,"tp_size":1},"decode":{"dp_size":1,"tp_size":1}}}'

checks:
  readiness:
    path: /health
    timeout_sec: 1200
    interval_sec: 10

tests:
  smoke:
    enabled: true
    suites:
      include_common: false
      capabilities: []
      extra_suite_files:
        - .ci/test_suites/smoke/qwen25_vl_pd.csv
  benchmark:
    enabled: false
    command: []
    thresholds:
      max_failed_requests: 0
      max_ttft_regression_pct: 10
      max_tpot_regression_pct: 10
      max_itl_regression_pct: 10
      max_throughput_drop_pct: 10
  accuracy:
    enabled: false
    mode: execute_only
    command: []
